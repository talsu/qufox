# qufox web — vite로 빌드된 정적 파일을 nginx:alpine이 서빙하는 이미지.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qufox-web
  namespace: qufox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qufox-web
  template:
    metadata:
      labels:
        app: qufox-web
    spec:
      containers:
        - name: web
          image: qufox/web:arm64
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: 256Mi             # compose mem_limit: 256m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: qufox-web
  namespace: qufox
spec:
  selector:
    app: qufox-web
  ports:
    - port: 80
      targetPort: 80
